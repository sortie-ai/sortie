# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: sortie
report_sizes: true

before:
  hooks:
    - go mod verify

builds:
  - id: sortie
    main: ./cmd/sortie
    binary: sortie
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    flags:
      - -trimpath
    tags:
      - osusergo
      - netgo
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: sortie
    repository:
      owner: sortie-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@users.noreply.github.com
    commit_msg_template: "chore(formula): update {{ .ProjectName }} to {{ .Tag }}"
    homepage: "https://github.com/sortie-ai/sortie"
    description: "Spec-first orchestration service for coding agents"
    license: "Apache-2.0"
    install: |
      bin.install "sortie"
    test: |
      assert_match version.to_s, shell_output("#{bin}/sortie --version")
    skip_upload: "auto"

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([^)]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([^)]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "(?i)^docs[:(]"
      - "(?i)^test[:(]"
      - "(?i)^chore[:(]"
      - "(?i)^ci[:(]"
      - "(?i)^style[:(]"
      - "(?i)^refactor[:(]"

release:
  github:
    owner: sortie-ai
    name: sortie
  name_template: "{{ .ProjectName }} {{ .Version }}"
  footer: |
    ---

    **Full changelog**: https://github.com/sortie-ai/sortie/blob/{{ .Tag }}/CHANGELOG.md

    **Diff**: https://github.com/sortie-ai/sortie/compare/{{ .PreviousTag }}...{{ .Tag }}
  draft: false
  prerelease: auto
  make_latest: true
  mode: keep-existing

snapshot:
  version_template: "{{ incpatch .Version }}-SNAPSHOT-{{ .ShortCommit }}"
