version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - copyloopvar
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - sloglint
    - bodyclose
    - noctx
    - gosec
  settings:
    sloglint:
      attr-only: true
      static-msg: true
      key-naming-case: snake
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sortie-ai/sortie

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
